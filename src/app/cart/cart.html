<div class="cart-container">
    <h2 class="cart-title">Your Shopping Cart</h2>

    <div *ngIf="items.length === 0" class="empty-cart">
        <p>Your cart is empty.</p>
        <button routerLink="/" class="back-btn">Go to Shop</button>
    </div>

    <div class="cart-layout" *ngIf="items.length > 0">
        <div class="cart-grid">
            <div class="phone-card" *ngFor="let item of items; let i = index">
                <div class="img-wrapper">
                    <img [src]="item.image.startsWith('data:') ? item.image : 'img/' + item.image" alt="phone">
                </div>
                <div class="item-details">
                    <h3>{{item.model}}</h3>
                    <p class="brand">{{item.brand}}</p>
                    <p class="quantity">Quantity: {{item.quantity || 1}}</p>
                    <p class="price">Price: ${{item.price}}</p>
                    <button class="remove-btn" (click)="remove(i)">Remove</button>
                </div>
            </div>
        </div>

        <div class="cart-summary">
            <h3>Order Summary</h3>
            <div class="summary-row">
                <span>Items in cart:</span>
                <span>{{totalCount}}</span>
            </div>
            <div class="summary-row total">
                <span>Total Amount:</span>
                <span>${{totalAmount}}</span>
            </div>

            <button class="checkout-btn" 
                    *ngIf="phoneService.currentUser" 
                    (click)="checkout()">
                PROCEED TO CHECKOUT
            </button>

            <p *ngIf="!phoneService.currentUser" class="login-warning">
                Please <strong>Login</strong> to complete your purchase.
            </p>
        </div>
    </div>
</div>
